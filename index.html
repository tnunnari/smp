<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Smart Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen flex flex-col">

    <div id="app" class="w-full min-h-screen flex flex-col"></div>
    <div id="notification-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none"></div>

<script>
    // ==========================================
    // CONFIGURAZIONE DATABASE GOOGLE
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_zKSGDnVNku17dc4mAdDOCPPZ7vaUU6bjDOJMiNV1btZaaLgQAiGcINGKBssDfsWT/exec"; 

    // --- VARIABILI GLOBALI ---
    let USERS = [];
    let FLOORS = {};
    let CLOSED_DAYS = {}; 

    const MAX_DAYS_PER_MONTH = 6;
    const MAX_FRIDAYS_PER_MONTH = 2;

    const today = new Date();
    const state = {
        loginStep: 1,
        loginUser: null,
        currentUser: null,
        isBoardView: false, 
        showDayDetails: null,
        currentMonthDate: new Date(today.getFullYear(), today.getMonth(), 1),
        selectedDate: today,
        bookings: [],
        isLoading: true
    };

    // --- FUNZIONI DI NORMALIZZAZIONE DATE (BLINDATURA) ---
    // Questa funzione prende qualsiasi data arrivi da Google e la forza nel formato perfetto YYYY-MM-DD
    function normalizeDateStr(dStr) {
        if (!dStr) return null;
        try {
            // Se arriva come ISO con orario (es. 2026-04-10T22:00:00.000Z), taglia via l'orario
            let justDate = String(dStr).split('T')[0];
            let parts = justDate.split('-');
            
            // Se non ha i trattini, proviamo con gli slash
            if (parts.length !== 3) parts = justDate.split('/');
            
            if (parts.length === 3) {
                // Se la data è GG/MM/YYYY (formato europeo)
                if (parts[0].length <= 2 && parts[2].length === 4) {
                    const d = parts[0].padStart(2, '0');
                    const m = parts[1].padStart(2, '0');
                    const y = parts[2];
                    return `${y}-${m}-${d}`;
                }
                // Se la data è YYYY-MM-DD
                const y = parts[0];
                const m = parts[1].padStart(2, '0');
                const d = parts[2].padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            return String(dStr).trim();
        } catch (e) {
            return String(dStr).trim();
        }
    }

    // --- CARICAMENTO DATI ---
    async function loadDataFromGoogleSheets() {
        try {
            state.isLoading = true;
            render();

            const response = await fetch(SCRIPT_URL + "?action=getData");
            const data = await response.json();

            USERS = data.users || [];
            
            // Normalizzazione forte delle prenotazioni
            state.bookings = (data.bookings || []).map(b => ({
                ...b,
                date: normalizeDateStr(b.date)
            })).filter(b => b.date !== null);

            // Normalizzazione forte delle chiusure (gestisce sia array vecchi che oggetti nuovi)
            CLOSED_DAYS = {};
            if (Array.isArray(data.closures)) {
                data.closures.forEach(d => {
                    const normD = normalizeDateStr(d);
                    if (normD) CLOSED_DAYS[normD] = "Chiuso";
                });
            } else if (data.closures && typeof data.closures === 'object') {
                Object.keys(data.closures).forEach(k => {
                    const normD = normalizeDateStr(k);
                    if (normD) CLOSED_DAYS[normD] = data.closures[k];
                });
            }

            calculateDynamicFloors();
            state.isLoading = false;
            render();
        } catch (error) {
            console.error("Errore Sync:", error);
            showNotification("Errore di connessione al database Google.", "error");
            state.isLoading = false;
            render();
        }
    }

    function calculateDynamicFloors() {
        FLOORS = {};
        USERS.forEach(user => {
            if (!FLOORS[user.floor]) { FLOORS[user.floor] = { total: 0, maxSw: 0 }; }
            FLOORS[user.floor].total += 1;
        });

        Object.keys(FLOORS).forEach(floorName => {
            let limit = Math.round(FLOORS[floorName].total * 0.30);
            if (limit < 1 && FLOORS[floorName].total > 0) limit = 1; 
            FLOORS[floorName].maxSw = limit;
        });
    }

    async function syncBookingWithGoogle(bookingData, actionType) {
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: actionType, booking: bookingData })
            });
            return true;
        } catch (e) {
            console.error("Sync Error:", e);
            return false;
        }
    }

    // --- HELPER FUNZIONI ---
    function getLocalDateString(dateObj) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function formatDisplayDate(dateStr) {
        const parts = dateStr.split('-');
        const dateObj = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
        return dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showNotification(message, type = 'error') {
        const container = document.getElementById('notification-container');
        const bgColor = type === 'error' ? 'bg-red-600' : 'bg-green-600';
        const icon = type === 'error' ? 'x-circle' : 'check-circle-2';
        
        const toast = document.createElement('div');
        toast.className = `toast-enter ${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 mb-2`;
        toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><p class="font-medium">${message}</p>`;
        container.appendChild(toast);
        lucide.createIcons({ root: toast });
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    function getCapacityColorLevels(percentage) {
        if (percentage >= 100) return { bar: 'bg-red-500', badgeBg: 'bg-red-50', badgeText: 'text-red-700', badgeBorder: 'border-red-200' };
        if (percentage >= 50) return { bar: 'bg-orange-500', badgeBg: 'bg-orange-100', badgeText: 'text-orange-800', badgeBorder: 'border-orange-300' };
        if (percentage > 0) return { bar: 'bg-yellow-400', badgeBg: 'bg-yellow-50', badgeText: 'text-yellow-800', badgeBorder: 'border-yellow-300' };
        return { bar: 'bg-emerald-400', badgeBg: 'bg-emerald-50', badgeText: 'text-emerald-700', badgeBorder: 'border-emerald-200' };
    }

    // --- AZIONI ---
    function selectLoginUser(userId) { state.loginUser = USERS.find(u => u.id == userId); state.loginStep = 2; render(); }
    function cancelLogin() { state.loginUser = null; state.loginStep = 1; render(); }
    function submitLogin() {
        const pwdInput = document.getElementById('password-input').value;
        if (String(pwdInput) === String(state.loginUser.password)) {
            state.currentUser = state.loginUser; state.loginStep = 1; render();
        } else { showNotification("Password errata.", "error"); }
    }
    function logout() { state.currentUser = null; state.isBoardView = false; state.showDayDetails = null; render(); }
    function enterBoardView() { state.isBoardView = true; render(); }
    function exitBoardView() { state.isBoardView = false; state.showDayDetails = null; render(); }
    function openDayDetails(dateStr) { state.showDayDetails = dateStr; render(); }
    function closeDayDetails() { state.showDayDetails = null; render(); }
    function changeMonth(offset) { state.currentMonthDate = new Date(state.currentMonthDate.getFullYear(), state.currentMonthDate.getMonth() + offset, 1); render(); }
    function selectDate(dateStr) { const parts = dateStr.split('-'); state.selectedDate = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0); render(); }

    async function toggleBooking() {
        const selectedDateStr = getLocalDateString(state.selectedDate);
        
        const chiusuraMotivo = CLOSED_DAYS[selectedDateStr];
        if (chiusuraMotivo) { showNotification(`Studio chiuso: ${chiusuraMotivo}`, "error"); return; }
        
        const existingIndex = state.bookings.findIndex(b => b.userId == state.currentUser.id && b.date === selectedDateStr);
        if (existingIndex > -1) {
            const bToRemove = state.bookings[existingIndex];
            state.bookings.splice(existingIndex, 1);
            showNotification("Annullamento in corso...", "success");
            await syncBookingWithGoogle(bToRemove, "remove");
            render();
            return;
        }
        
        const monStr = selectedDateStr.substring(0, 7);
        const userB = state.bookings.filter(b => b.userId == state.currentUser.id && b.date.startsWith(monStr));
        if (userB.length >= MAX_DAYS_PER_MONTH) { showNotification(`Limite ${MAX_DAYS_PER_MONTH}gg raggiunto.`, "error"); return; }
        
        const dayOfWeek = state.selectedDate.getDay();
        if (dayOfWeek === 5) {
            let fridaysCount = userB.filter(b => {
                const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0);
                return d.getDay() === 5;
            }).length;
            if (fridaysCount >= MAX_FRIDAYS_PER_MONTH) { showNotification(`Max ${MAX_FRIDAYS_PER_MONTH} venerdì.`, "error"); return; }
        }

        const floorB = state.bookings.filter(b => b.floor === state.currentUser.floor && b.date === selectedDateStr);
        const floorMax = FLOORS[state.currentUser.floor] ? FLOORS[state.currentUser.floor].maxSw : 1;
        if (floorB.length >= floorMax) { showNotification("Capacità piano esaurita.", "error"); return; }

        const newB = { id: Date.now(), userId: state.currentUser.id, name: state.currentUser.name, date: selectedDateStr, floor: state.currentUser.floor };
        state.bookings.push(newB);
        showNotification("Prenotazione in corso...", "success");
        await syncBookingWithGoogle(newB, "add");
        render();
    }

    // --- RENDERING ---
    function render() {
        const app = document.getElementById('app');
        if (state.isLoading) { app.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-4"><i data-lucide="loader-2" class="w-12 h-12 text-indigo-600 animate-spin mb-4"></i><p class="text-slate-500 font-bold">Accesso al Database Google...</p></div>`; }
        else if (state.isBoardView) { app.innerHTML = renderBoardScreen(); attachBoardListeners(); }
        else if (!state.currentUser) { app.innerHTML = renderLoginScreen(); if (state.loginStep === 2) setTimeout(() => document.getElementById('password-input')?.focus(), 100); }
        else { app.innerHTML = renderDashboardScreen(); attachDashboardListeners(); }
        lucide.createIcons();
    }

    function renderLoginScreen() {
        let userButtons = USERS.map(user => `
            <button onclick="selectLoginUser(${user.id})" class="w-full flex items-center justify-between p-3 border rounded-xl hover:bg-indigo-50 transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">${user.name.charAt(0)}</div>
                    <div class="text-left"><p class="font-bold text-slate-800">${user.name}</p><p class="text-xs text-slate-500">${user.floor}</p></div>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
            </button>`).join('');
        
        let content = '';
        if (state.loginStep === 1) {
            content = `<h2 class="text-sm font-bold text-slate-400 uppercase mb-4 text-center">Seleziona utente</h2><div class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar mb-6">${userButtons}</div><div class="border-t pt-6"><button onclick="enterBoardView()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2"><i data-lucide="calendar" class="w-5 h-5"></i> Calendario SW Generale</button></div>`;
        } else {
            content = `<button onclick="cancelLogin()" class="text-sm text-indigo-600 font-bold mb-4 flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i> Indietro</button><div class="bg-indigo-50 rounded-xl p-4 mb-6 flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-indigo-200 flex items-center justify-center text-indigo-800 font-bold text-xl">${state.loginUser.name.charAt(0)}</div><div><p class="font-bold text-slate-800">${state.loginUser.name}</p><p class="text-sm text-slate-500">${state.loginUser.floor}</p></div></div><div class="space-y-4"><div><label class="block text-sm font-bold text-slate-700 mb-1">Password</label><input type="password" id="password-input" onkeypress="if(event.key==='Enter')submitLogin()" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></div><button onclick="submitLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl">Accedi</button></div>`;
        }
        return `<div class="flex-1 flex flex-col items-center justify-center p-4 py-12"><div class="max-w-md w-full bg-white rounded-2xl shadow-xl border overflow-hidden"><div class="bg-slate-900 p-8 text-center text-white"><i data-lucide="building-2" class="w-14 h-14 mx-auto mb-3"></i><h1 class="text-2xl font-bold">Studio Smart Booking</h1></div><div class="p-8">${content}</div></div></div>`;
    }

    function renderBoardScreen() {
        let modalHtml = "";
        if (state.showDayDetails) {
            const dayB = state.bookings.filter(b => b.date === state.showDayDetails);
            let groups = Object.keys(FLOORS).map(f => {
                const p = dayB.filter(b => b.floor === f);
                if (p.length === 0) return "";
                return `<div class="mb-4"><h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 border-b pb-1">${f}</h4><div class="space-y-1">${p.map(b => {
                    // Utilizza b.name fornito direttamente dal backend per evitare problemi di ID
                    return `<div class="flex items-center gap-2 text-sm font-semibold text-slate-700 p-2 bg-slate-50 rounded-lg"><div class="w-2 h-2 rounded-full bg-emerald-500"></div>${b.name || "Utente"}</div>`;
                }).join('')}</div></div>`;
            }).join('');
            modalHtml = `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeDayDetails()"><div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden" onclick="event.stopPropagation()"><div class="bg-slate-900 p-6 text-white flex justify-between items-center"><div><p class="text-xs font-bold text-slate-400 uppercase">Recap Presenze SW</p><h3 class="text-lg font-bold capitalize">${formatDisplayDate(state.showDayDetails)}</h3></div><button onclick="closeDayDetails()" class="p-2 hover:bg-slate-800 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button></div><div class="p-6 max-h-[60vh] overflow-y-auto custom-scrollbar">${groups || '<p class="text-center py-8 text-slate-400">Nessuna prenotazione per questa data.</p>'}</div></div></div>`;
        }
        return `<header class="bg-slate-900 text-white shadow-md sticky top-0 z-40"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><div class="flex items-center gap-3"><i data-lucide="calendar" class="w-6 h-6 text-emerald-400"></i><h1 class="font-bold text-lg text-white">Calendario SW Generale</h1></div><button onclick="exitBoardView()" class="bg-slate-800 hover:bg-slate-700 text-sm font-bold py-2 px-4 rounded-lg text-white">Esci</button></div></header><main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full"><div class="bg-white rounded-2xl shadow-sm border flex flex-col overflow-hidden"><div class="p-6 border-b flex items-center justify-between bg-slate-50"><h2 class="text-xl font-bold uppercase">${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}</h2><div class="flex gap-2"><button onclick="changeMonth(-1)" class="px-4 py-2 bg-white border rounded-lg text-sm font-medium">Prec.</button><button onclick="changeMonth(1)" class="px-4 py-2 bg-white border rounded-lg text-sm font-medium">Succ.</button></div></div><div class="p-6"><div class="grid grid-cols-7 gap-4 mb-4 text-center font-bold text-slate-400 text-xs uppercase tracking-widest">${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div>${d}</div>`).join('')}</div><div class="grid grid-cols-7 gap-3" id="board-calendar-grid">${generateBoardCalendarCellsHTML()}</div></div></div></main>${modalHtml}`;
    }

    function generateBoardCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        let html = '';
        let totalCap = 0; Object.keys(FLOORS).forEach(f => totalCap += FLOORS[f].maxSw);
        for (let i = 0; i < firstDay; i++) html += `<div class="h-32 rounded-xl bg-slate-50 opacity-50 border border-transparent"></div>`;
        for (let day = 1; day <= daysInMonth; day++) {
            // Creazione data alle 12:00 per evitare cambi di giorno dovuti all'ora legale (DST)
            const dObj = new Date(year, month, day, 12, 0, 0); 
            const dateStr = getLocalDateString(dObj);
            
            const dayB = state.bookings.filter(b => b.date === dateStr);
            const perc = totalCap > 0 ? Math.round((dayB.length / totalCap) * 100) : 0;
            const colors = getCapacityColorLevels(perc);
            
            const chiusuraMotivo = CLOSED_DAYS[dateStr];
            const isC = !!chiusuraMotivo;

            let cellCl = `board-day-cell h-32 p-2 rounded-xl border flex flex-col relative transition-all shadow-sm cursor-pointer `;
            if (isC) { cellCl += " bg-orange-50 border-orange-200 pointer-events-none"; }
            else { cellCl += ` ${colors.badgeBg} ${colors.badgeBorder} hover:shadow-md hover:-translate-y-1`; }
            
            let inner = isC 
                ? `<div class="mt-auto text-[10px] font-bold bg-orange-100 text-orange-600 rounded py-1 px-1 text-center uppercase truncate" title="${chiusuraMotivo}">${chiusuraMotivo}</div>` 
                // Qui usiamo direttamente b.name invece di cercare l'ID
                : `<div class="mt-1 space-y-0.5 overflow-hidden flex-1">${dayB.map(b => `<div class="text-[9px] font-medium bg-white/80 text-slate-700 px-1 rounded truncate shadow-sm mb-0.5">${b.name || "..."}</div>`).join('')}</div><div class="text-[9px] ${colors.badgeText} text-right mt-1 font-extrabold uppercase">${perc}% SAT</div>`;
            
            html += `<div class="${cellCl}" data-date="${dateStr}"><span class="font-bold text-xs ${isC ? 'text-orange-800' : colors.badgeText}">${day}</span>${inner}</div>`;
        }
        return html;
    }

    function renderDashboardScreen() {
        const dateStr = getLocalDateString(state.selectedDate), monStr = dateStr.substring(0, 7);
        const userB = state.bookings.filter(b => b.userId == state.currentUser.id && b.date.startsWith(monStr));
        const hasBooked = state.bookings.some(b => b.userId == state.currentUser.id && b.date === dateStr);
        
        const chiusuraMotivo = CLOSED_DAYS[dateStr];
        const isC = !!chiusuraMotivo;

        let floorStats = Object.keys(FLOORS).map(f => {
            const booked = state.bookings.filter(b => b.date === dateStr && b.floor === f).length, max = FLOORS[f].maxSw;
            const p = Math.min(Math.round((booked / max) * 100), 100), colors = getCapacityColorLevels(p);
            return `<div class="p-3 bg-slate-50 rounded-xl border mb-2"><div class="flex justify-between items-end mb-1"><span class="text-xs font-semibold text-slate-700">${f}</span><span class="text-xs font-bold text-slate-800">${p}%</span></div><div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden"><div class="h-full ${colors.bar}" style="width: ${p}%"></div></div></div>`;
        }).join('');
        
        let btn = isC 
            ? `<div class="text-center p-4 bg-orange-50 rounded-xl text-orange-600 font-bold border border-orange-200 uppercase">${chiusuraMotivo}</div>` 
            : `<button onclick="toggleBooking()" class="w-full py-4 px-4 rounded-xl font-bold text-white shadow-lg transition-all transform hover:-translate-y-1 ${hasBooked ? 'bg-red-500 hover:bg-red-600 shadow-red-200' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200'}">${hasBooked ? 'Annulla Smart Working' : 'Prenota Smart Working'}</button>`;
        
        return `<header class="bg-slate-900 text-white shadow-md sticky top-0 z-40"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><div class="flex items-center gap-3"><i data-lucide="building-2" class="w-6 h-6 text-indigo-400"></i><h1 class="font-bold text-lg tracking-tight">Studio Smart Booking</h1></div><div class="flex items-center gap-4"><div class="flex items-center gap-2 text-sm"><div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold shadow-inner">${state.currentUser.name.charAt(0)}</div><span>${state.currentUser.name}</span></div><button onclick="logout()" class="p-2 hover:bg-slate-800 rounded-lg transition-colors text-slate-300 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></button></div></div></header><main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full grid grid-cols-1 lg:grid-cols-4 gap-8"><div class="lg:col-span-1 space-y-6"><div class="bg-white rounded-2xl shadow-md border overflow-hidden"><div class="bg-indigo-50 p-4 border-b border-indigo-100"><p class="text-xs font-bold text-indigo-400 uppercase mb-1">Giorno Selezionato</p><h2 class="text-lg font-bold capitalize text-indigo-900">${formatDisplayDate(dateStr)}</h2></div><div class="p-5">${btn}</div></div><div class="bg-white rounded-2xl shadow-sm border p-6"><h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="building-2" class="w-4 h-4 text-indigo-600"></i>Occupazione Piani</h2>${floorStats}</div><div class="bg-white rounded-2xl shadow-sm border p-6"><h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-indigo-600"></i>I Tuoi Limiti</h2><div class="p-3 bg-slate-50 rounded-xl border border-slate-100 mb-2"><div class="flex justify-between items-end mb-1"><span class="text-xs text-slate-500">Giorni Mensili</span><span class="text-xs font-bold text-slate-800">${userB.length} / ${MAX_DAYS_PER_MONTH}</span></div><div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-indigo-600 h-1.5 rounded-full" style="width: ${(userB.length / MAX_DAYS_PER_MONTH) * 100}%"></div></div></div><div class="p-3 bg-slate-50 rounded-xl border border-slate-100"><div class="flex justify-between items-end mb-1"><span class="text-xs text-slate-500">Venerdì prenotati</span><span class="text-xs font-bold text-slate-800">${userB.filter(b=>{ const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0); return d.getDay()===5; }).length} / ${MAX_FRIDAYS_PER_MONTH}</span></div><div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-indigo-400 h-1.5 rounded-full" style="width: ${(userB.filter(b=>{ const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0); return d.getDay()===5; }).length / MAX_FRIDAYS_PER_MONTH) * 100}%"></div></div></div></div></div><div class="lg:col-span-3 bg-white rounded-2xl shadow-sm border flex flex-col overflow-hidden"><div class="p-6 border-b flex items-center justify-between bg-slate-50"><h2 class="text-xl font-bold uppercase text-slate-800 tracking-tight">${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}</h2><div class="flex gap-2"><button onclick="changeMonth(-1)" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium hover:text-indigo-600 transition-colors">Prec.</button><button onclick="changeMonth(1)" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium hover:text-indigo-600 transition-colors">Succ.</button></div></div><div class="p-6 flex-1"><div class="grid grid-cols-7 gap-4 mb-4 text-center font-bold text-slate-400 text-xs uppercase tracking-widest">${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div>${d}</div>`).join('')}</div><div class="grid grid-cols-7 gap-3">${generateCalendarCellsHTML()}</div></div></div></main>`;
    }

    function generateCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        let html = ''; 
        const selStr = getLocalDateString(state.selectedDate);
        
        for (let i = 0; i < firstDay; i++) html += `<div class="aspect-square rounded-xl bg-slate-50 opacity-50 border border-transparent"></div>`;
        for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day, 12, 0, 0); 
            const dStr = getLocalDateString(dObj);
            const isSel = selStr === dStr;
            
            const floorB = state.bookings.filter(b => b.date === dStr && b.floor === state.currentUser.floor);
            const mSw = FLOORS[state.currentUser.floor]?.maxSw || 1;
            const myB = state.bookings.find(b => b.date === dStr && b.userId == state.currentUser.id);
            
            const chiusuraMotivo = CLOSED_DAYS[dStr];
            const isC = !!chiusuraMotivo;

            let p = Math.round((floorB.length / mSw) * 100); if (p > 100) p = 100;
            const colors = getCapacityColorLevels(p);
            let cCl = `day-cell aspect-square p-2 rounded-xl border flex flex-col relative transition-all cursor-pointer ${isSel ? 'ring-4 ring-indigo-300 ring-offset-1 border-indigo-500 z-10' : ''}`, bH = "";
            
            if (isC) { 
                cCl += " bg-orange-50 border-orange-200 pointer-events-none"; 
                bH = `<div class="text-[9px] font-bold bg-orange-100 text-orange-600 rounded px-1 text-center uppercase shadow-sm truncate" title="${chiusuraMotivo}">${chiusuraMotivo}</div>`; 
            }
            else if (myB) { 
                cCl += " bg-indigo-600 border-indigo-700 shadow-md"; 
                bH = `<div class="text-[9px] font-bold bg-white text-indigo-700 rounded px-1 text-center shadow-sm uppercase tracking-tighter">IL TUO SW</div>`; 
            }
            else if (floorB.length >= mSw) { 
                cCl += " bg-red-50 border-red-200"; 
                bH = `<div class="text-[9px] font-bold bg-red-500 text-white rounded px-1 text-center shadow-sm uppercase flex items-center justify-center gap-1"><i data-lucide="lock" class="w-3 h-3"></i> PIENO</div>`; 
            }
            else { 
                cCl += ` bg-white border-slate-200 hover:border-indigo-400`; 
                bH = `<div class="text-[9px] font-semibold text-center ${colors.badgeText} ${colors.badgeBg} rounded py-1 border ${colors.badgeBorder} shadow-sm">SW al ${p}%</div>`; 
            }
            html += `<div class="${cCl}" onclick="selectDate('${dStr}')"><span class="font-bold text-xs ${isC ? 'text-orange-800' : 'text-slate-700'}">${day}</span><div class="mt-auto pt-1">${bH}</div></div>`;
        }
        return html;
    }

    function attachDashboardListeners() { }
    function attachBoardListeners() { document.querySelectorAll('.board-day-cell').forEach(c => { c.onclick = () => openDayDetails(c.dataset.date); }); }

    loadDataFromGoogleSheets();

</script>
</body>
</html>
