<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Smart Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen flex flex-col">

    <div id="app" class="w-full min-h-screen flex flex-col"></div>
    <div id="notification-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none"></div>

<script>
    // ==========================================
    // CONFIGURAZIONE DATABASE GOOGLE
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXoIgjXXp_d7cbgBZJHdb-TehjRi6B-i0RZSY573iEf5QqEwSp3eCgjq_NtKzC6OvD/exec"; 

    // --- VARIABILI GLOBALI ---
    let USERS = [];
    let FLOORS = {};
    let CLOSED_DAYS = {}; 

    const MAX_DAYS_PER_MONTH = 6;
    const MAX_FRIDAYS_PER_MONTH = 2;

    const today = new Date();
    const state = {
        loginStep: 1,
        loginUser: null,
        currentUser: null,
        isBoardView: false, 
        showDayDetails: null,
        currentMonthDate: new Date(today.getFullYear(), today.getMonth(), 1),
        selectedDate: today,
        bookings: [],
        isLoading: true
    };

    // --- FUNZIONI DI NORMALIZZAZIONE DATE ---
    function normalizeDateStr(dStr) {
        if (!dStr) return null;
        try {
            let justDate = String(dStr).split('T')[0];
            let parts = justDate.split('-');
            if (parts.length !== 3) parts = justDate.split('/');
            if (parts.length === 3) {
                // Formato GG/MM/YYYY
                if (parts[0].length <= 2 && parts[2].length === 4) {
                    return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                }
                // Formato YYYY-MM-DD
                return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            }
            return String(dStr).trim();
        } catch (e) {
            return String(dStr).trim();
        }
    }

    // --- CARICAMENTO DATI ---
    async function loadDataFromGoogleSheets() {
        try {
            state.isLoading = true;
            render();

            const response = await fetch(SCRIPT_URL + "?action=getData", {
                method: "GET",
                redirect: "follow"
            });
            
            if (!response.ok) throw new Error("Errore risposta server");
            
            const data = await response.json();

            USERS = data.users || [];
            
            // Sincronizzazione prenotazioni
            state.bookings = (data.bookings || []).map(b => ({
                ...b,
                date: normalizeDateStr(b.date)
            })).filter(b => b.date !== null);

            // Sincronizzazione chiusure
            CLOSED_DAYS = {};
            if (data.closures && typeof data.closures === 'object') {
                Object.keys(data.closures).forEach(k => {
                    const normD = normalizeDateStr(k);
                    if (normD) CLOSED_DAYS[normD] = data.closures[k];
                });
            }

            calculateDynamicFloors();
            state.isLoading = false;
            render();
        } catch (error) {
            console.error("Errore Sync:", error);
            showNotification("Errore di accesso al Database. Verifica i permessi dell'App Script (Anyone).", "error");
            state.isLoading = false;
            render();
        }
    }

    function calculateDynamicFloors() {
        FLOORS = {};
        USERS.forEach(user => {
            if (!FLOORS[user.floor]) { FLOORS[user.floor] = { total: 0, maxSw: 0 }; }
            FLOORS[user.floor].total += 1;
        });

        Object.keys(FLOORS).forEach(floorName => {
            let limit = Math.round(FLOORS[floorName].total * 0.30);
            if (limit < 1 && FLOORS[floorName].total > 0) limit = 1; 
            FLOORS[floorName].maxSw = limit;
        });
    }

    async function syncBookingWithGoogle(bookingData, actionType) {
        try {
            // NOTA: Il browser potrebbe mostrare un errore CORS, ma con redirect: follow
            // e Apps Script pubblicato correttamente, l'operazione va a buon fine sul foglio.
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: actionType, booking: bookingData }),
                redirect: "follow" 
            });
            return true;
        } catch (e) {
            console.error("Errore invio dati:", e);
            return false;
        }
    }

    // --- HELPER FUNZIONI ---
    function getLocalDateString(dateObj) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function formatDisplayDate(dateStr) {
        const parts = dateStr.split('-');
        const dateObj = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
        return dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showNotification(message, type = 'error') {
        const container = document.getElementById('notification-container');
        const bgColor = type === 'error' ? 'bg-red-600' : 'bg-green-600';
        const icon = type === 'error' ? 'x-circle' : 'check-circle-2';
        
        const toast = document.createElement('div');
        toast.className = `toast-enter ${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 mb-2`;
        toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><p class="font-medium">${message}</p>`;
        
        container.appendChild(toast);
        lucide.createIcons({ root: toast });
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    function getCapacityColorLevels(percentage) {
        if (percentage >= 100) return { bar: 'bg-red-500', badgeBg: 'bg-red-50', badgeText: 'text-red-700', badgeBorder: 'border-red-200' };
        if (percentage >= 50) return { bar: 'bg-orange-500', badgeBg: 'bg-orange-100', badgeText: 'text-orange-800', badgeBorder: 'border-orange-300' };
        if (percentage > 0) return { bar: 'bg-yellow-400', badgeBg: 'bg-yellow-50', badgeText: 'text-yellow-800', badgeBorder: 'border-yellow-300' };
        return { bar: 'bg-emerald-400', badgeBg: 'bg-emerald-50', badgeText: 'text-emerald-700', badgeBorder: 'border-emerald-200' };
    }

    // --- AZIONI ---
    function selectLoginUser(userId) { state.loginUser = USERS.find(u => u.id == userId); state.loginStep = 2; render(); }
    function cancelLogin() { state.loginUser = null; state.loginStep = 1; render(); }
    function submitLogin() {
        const pwdInput = document.getElementById('password-input').value;
        if (String(pwdInput) === String(state.loginUser.password)) {
            state.currentUser = state.loginUser; state.loginStep = 1; render();
        } else { showNotification("Password errata.", "error"); }
    }
    function logout() { state.currentUser = null; state.isBoardView = false; state.showDayDetails = null; render(); }
    function enterBoardView() { state.isBoardView = true; render(); }
    function exitBoardView() { state.isBoardView = false; state.showDayDetails = null; render(); }
    function openDayDetails(dateStr) { state.showDayDetails = dateStr; render(); }
    function closeDayDetails() { state.showDayDetails = null; render(); }
    function changeMonth(offset) { state.currentMonthDate = new Date(state.currentMonthDate.getFullYear(), state.currentMonthDate.getMonth() + offset, 1); render(); }
    function selectDate(dateStr) { const parts = dateStr.split('-'); state.selectedDate = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0); render(); }

    async function toggleBooking() {
        const selectedDateStr = getLocalDateString(state.selectedDate);
        const chiusuraMotivo = CLOSED_DAYS[selectedDateStr];
        if (chiusuraMotivo) { showNotification(`Studio chiuso: ${chiusuraMotivo}`, "error"); return; }
        
        const existingIndex = state.bookings.findIndex(b => String(b.userId) === String(state.currentUser.id) && b.date === selectedDateStr);
        if (existingIndex > -1) {
            const bToRemove = state.bookings[existingIndex];
            state.bookings.splice(existingIndex, 1);
            showNotification("Sincronizzazione rimozione...", "success");
            await syncBookingWithGoogle(bToRemove, "remove");
            render();
            return;
        }
        
        const monStr = selectedDateStr.substring(0, 7);
        const userB = state.bookings.filter(b => String(b.userId) === String(state.currentUser.id) && b.date.startsWith(monStr));
        if (userB.length >= MAX_DAYS_PER_MONTH) { showNotification(`Limite ${MAX_DAYS_PER_MONTH}gg raggiunto.`, "error"); return; }
        
        const dayOfWeek = state.selectedDate.getDay();
        if (dayOfWeek === 5) {
            let fridaysCount = userB.filter(b => {
                const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0);
                return d.getDay() === 5;
            }).length;
            if (fridaysCount >= MAX_FRIDAYS_PER_MONTH) { showNotification(`Max ${MAX_FRIDAYS_PER_MONTH} venerdì.`, "error"); return; }
        }

        const floorB = state.bookings.filter(b => b.floor === state.currentUser.floor && b.date === selectedDateStr);
        const floorMax = FLOORS[state.currentUser.floor] ? FLOORS[state.currentUser.floor].maxSw : 1;
        if (floorB.length >= floorMax) { showNotification("Capacità piano esaurita.", "error"); return; }

        const newB = { id: Date.now(), userId: state.currentUser.id, name: state.currentUser.name, date: selectedDateStr, floor: state.currentUser.floor };
        state.bookings.push(newB);
        showNotification("Sincronizzazione prenotazione...", "success");
        await syncBookingWithGoogle(newB, "add");
        render();
    }

    // --- RENDERING ---
    function render() {
        const app = document.getElementById('app');
        if (state.isLoading) { 
            app.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-4"><i data-lucide="loader-2" class="w-12 h-12 text-indigo-600 animate-spin mb-4"></i><p class="text-slate-500 font-bold tracking-wide uppercase text-sm">Caricamento Database Studio...</p></div>`; 
        }
        else if (state.isBoardView) { app.innerHTML = renderBoardScreen(); attachBoardListeners(); }
        else if (!state.currentUser) { app.innerHTML = renderLoginScreen(); if (state.loginStep === 2) setTimeout(() => document.getElementById('password-input')?.focus(), 100); }
        else { app.innerHTML = renderDashboardScreen(); attachDashboardListeners(); }
        lucide.createIcons();
    }

    function renderLoginScreen() {
        let userButtons = USERS.map(user => `
            <button onclick="selectLoginUser(${user.id})" class="w-full flex items-center justify-between p-3 border rounded-xl hover:bg-indigo-50 transition-all group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">${user.name.charAt(0)}</div>
                    <div class="text-left"><p class="font-bold text-slate-800">${user.name}</p><p class="text-xs text-slate-500 font-medium">${user.floor}</p></div>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
            </button>`).join('');
        
        let content = '';
        if (state.loginStep === 1) {
            content = `<h2 class="text-sm font-bold text-slate-400 uppercase mb-4 text-center">Chi sei?</h2><div class="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar mb-6">${userButtons || '<p class="text-center text-red-500 text-xs font-bold">Nessun utente trovato.</p>'}</div><div class="border-t pt-6"><button onclick="enterBoardView()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95"><i data-lucide="calendar" class="w-5 h-5"></i> Calendario Generale</button></div>`;
        } else {
            content = `<button onclick="cancelLogin()" class="text-sm text-indigo-600 font-bold mb-4 flex items-center gap-1 hover:underline"><i data-lucide="arrow-left" class="w-4 h-4"></i> Indietro</button><div class="bg-indigo-50 rounded-xl p-4 mb-6 flex items-center gap-4 border border-indigo-100 shadow-inner"><div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-xl">${state.loginUser.name.charAt(0)}</div><div><p class="font-bold text-slate-800">${state.loginUser.name}</p><p class="text-sm text-slate-500">${state.loginUser.floor}</p></div></div><div class="space-y-4"><div><label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Password Personale</label><input type="password" id="password-input" onkeypress="if(event.key==='Enter')submitLogin()" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 focus:outline-none transition-all shadow-sm" placeholder="••••••••"></div><button onclick="submitLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-transform active:scale-95">Accedi al Portale</button></div>`;
        }
        return `<div class="flex-1 flex flex-col items-center justify-center p-4 py-12"><div class="max-w-md w-full bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden"><div class="bg-slate-900 p-10 text-center text-white"><i data-lucide="building-2" class="w-16 h-16 mx-auto mb-4 text-indigo-400"></i><h1 class="text-2xl font-bold tracking-tight">Studio Smart Booking</h1><p class="text-slate-400 text-sm mt-1">Gestione Presenze & Flessibilità</p></div><div class="p-8">${content}</div></div></div>`;
    }

    function renderBoardScreen() {
        let modalHtml = "";
        if (state.showDayDetails) {
            const dayB = state.bookings.filter(b => b.date === state.showDayDetails);
            let groups = Object.keys(FLOORS).map(f => {
                const p = dayB.filter(b => b.floor === f);
                if (p.length === 0) return "";
                return `<div class="mb-5"><h4 class="text-xs font-bold text-indigo-500 uppercase tracking-widest mb-3 border-b border-indigo-50 pb-1">${f}</h4><div class="space-y-2">${p.map(b => {
                    return `<div class="flex items-center gap-3 text-sm font-bold text-slate-700 p-3 bg-white border border-slate-100 rounded-xl shadow-sm hover:border-indigo-200 transition-colors"><div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>${b.name || "Utente"}</div>`;
                }).join('')}</div></div>`;
            }).join('');
            modalHtml = `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onclick="closeDayDetails()"><div class="bg-slate-50 rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-white" onclick="event.stopPropagation()"><div class="bg-slate-900 p-6 text-white flex justify-between items-center"><div><p class="text-xs font-bold text-slate-400 uppercase tracking-tighter mb-1">Dettaglio Presenze</p><h3 class="text-lg font-bold capitalize">${formatDisplayDate(state.showDayDetails)}</h3></div><button onclick="closeDayDetails()" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button></div><div class="p-6 max-h-[65vh] overflow-y-auto custom-scrollbar">${groups || '<div class="text-center py-12"><p class="text-slate-400 font-medium">Nessuna prenotazione per questa data.</p></div>'}</div></div></div>`;
        }
        return `<header class="bg-slate-900 text-white shadow-md sticky top-0 z-40"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><div class="flex items-center gap-3"><i data-lucide="calendar" class="w-6 h-6 text-indigo-400"></i><h1 class="font-bold text-lg">Calendario SW Generale</h1></div><button onclick="exitBoardView()" class="bg-slate-800 hover:bg-slate-700 text-sm font-bold py-2 px-5 rounded-xl border border-slate-700 transition-all">Torna al Login</button></div></header><main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full"><div class="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden"><div class="p-8 border-b flex items-center justify-between bg-slate-50"><h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}</h2><div class="flex gap-3"><button onclick="changeMonth(-1)" class="p-3 bg-white border border-slate-200 rounded-xl hover:text-indigo-600 shadow-sm transition-all active:scale-90"><i data-lucide="chevron-left" class="w-5 h-5"></i></button><button onclick="changeMonth(1)" class="p-3 bg-white border border-slate-200 rounded-xl hover:text-indigo-600 shadow-sm transition-all active:scale-90"><i data-lucide="chevron-right" class="w-5 h-5"></i></button></div></div><div class="p-8"><div class="grid grid-cols-7 gap-4 mb-6 text-center font-black text-slate-300 text-xs uppercase tracking-[0.2em]">${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div>${d}</div>`).join('')}</div><div class="grid grid-cols-7 gap-4" id="board-calendar-grid">${generateBoardCalendarCellsHTML()}</div></div></div></main>${modalHtml}`;
    }

    function generateBoardCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        let html = '';
        let totalCap = 0; Object.keys(FLOORS).forEach(f => totalCap += FLOORS[f].maxSw);
        for (let i = 0; i < firstDay; i++) html += `<div class="h-32 rounded-2xl bg-slate-50 opacity-30 border border-dashed border-slate-200"></div>`;
        
        for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day, 12, 0, 0);
            const dateStr = getLocalDateString(dObj);
            const dayB = state.bookings.filter(b => b.date === dateStr);
            const perc = totalCap > 0 ? Math.round((dayB.length / totalCap) * 100) : 0;
            const colors = getCapacityColorLevels(perc);
            
            const chiusuraMotivo = CLOSED_DAYS[dateStr];
            const isC = !!chiusuraMotivo;

            let cellCl = `board-day-cell h-32 p-3 rounded-2xl border flex flex-col relative transition-all shadow-sm cursor-pointer `;
            if (isC) { cellCl += " bg-orange-50 border-orange-200 pointer-events-none opacity-80"; }
            else { cellCl += ` ${colors.badgeBg} ${colors.badgeBorder} hover:shadow-xl hover:scale-[1.03] z-10`; }
            
            let inner = isC 
                ? `<div class="mt-auto text-[9px] font-black bg-orange-200 text-orange-700 rounded-lg py-1.5 px-1 text-center uppercase truncate">${chiusuraMotivo}</div>` 
                : `<div class="mt-2 space-y-1 overflow-hidden flex-1">${dayB.map(b => `<div class="text-[9px] font-bold bg-white/70 text-slate-700 px-2 py-0.5 rounded-md truncate border border-slate-100 shadow-sm">${b.name}</div>`).join('')}</div><div class="text-[9px] ${colors.badgeText} text-right mt-1 font-black uppercase tracking-tight">${perc}% SAT</div>`;
            
            html += `<div class="${cellCl}" data-date="${dateStr}"><span class="font-black text-sm ${isC ? 'text-orange-800' : colors.badgeText}">${day}</span>${inner}</div>`;
        }
        return html;
    }

    function renderDashboardScreen() {
        const dateStr = getLocalDateString(state.selectedDate), monStr = dateStr.substring(0, 7);
        const userB = state.bookings.filter(b => String(b.userId) === String(state.currentUser.id) && b.date.startsWith(monStr));
        const hasBooked = state.bookings.some(b => String(b.userId) === String(state.currentUser.id) && b.date === dateStr);
        
        const chiusuraMotivo = CLOSED_DAYS[dateStr];
        const isC = !!chiusuraMotivo;

        let floorStats = Object.keys(FLOORS).map(f => {
            const booked = state.bookings.filter(b => b.date === dateStr && b.floor === f).length, max = FLOORS[f].maxSw;
            const p = Math.min(Math.round((booked / max) * 100), 100), colors = getCapacityColorLevels(p);
            return `<div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-3"><div class="flex justify-between items-end mb-2"><span class="text-xs font-black uppercase tracking-wider text-slate-400">${f}</span><span class="text-sm font-black text-slate-800">${p}%</span></div><div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden shadow-inner"><div class="h-full ${colors.bar} transition-all duration-700" style="width: ${p}%"></div></div></div>`;
        }).join('');
        
        let btn = isC 
            ? `<div class="text-center p-6 bg-orange-100 rounded-2xl text-orange-700 font-black border border-orange-200 uppercase tracking-widest shadow-inner">${chiusuraMotivo}</div>` 
            : `<button onclick="toggleBooking()" class="w-full py-5 px-4 rounded-2xl font-black text-white shadow-2xl transition-all transform active:scale-95 ${hasBooked ? 'bg-red-500 hover:bg-red-600 shadow-red-100' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100'}">${hasBooked ? 'ANNULLA SMART WORKING' : 'PRENOTA SMART WORKING'}</button>`;
        
        return `<header class="bg-slate-900 text-white shadow-md sticky top-0 z-40"><div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"><div class="flex items-center gap-3"><i data-lucide="building-2" class="w-6 h-6 text-indigo-400"></i><h1 class="font-bold text-lg tracking-tight">Studio Smart Booking</h1></div><div class="flex items-center gap-4"><div class="flex items-center gap-3 text-sm"><div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center font-black shadow-lg">${state.currentUser.name.charAt(0)}</div><span class="hidden sm:inline font-bold">${state.currentUser.name}</span></div><button onclick="logout()" class="p-2 hover:bg-slate-800 rounded-xl transition-colors text-slate-400 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></button></div></div></header><main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full grid grid-cols-1 lg:grid-cols-4 gap-8"><div class="lg:col-span-1 space-y-6"><div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden"><div class="bg-indigo-50 p-6 border-b border-indigo-100 shadow-sm"><p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Giorno Selezionato</p><h2 class="text-xl font-black capitalize text-indigo-900">${formatDisplayDate(dateStr)}</h2></div><div class="p-6">${btn}</div></div><div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6"><h2 class="text-xs font-black text-slate-400 uppercase mb-5 tracking-widest flex items-center gap-2"><i data-lucide="bar-chart-3" class="w-4 h-4 text-indigo-600"></i>Occupazione del giorno</h2>${floorStats}</div><div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6"><h2 class="text-xs font-black text-slate-400 uppercase mb-5 tracking-widest flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-indigo-600"></i>I Tuoi Limiti</h2><div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-3"><div class="flex justify-between items-end mb-2"><span class="text-xs font-bold text-slate-400">Mensile</span><span class="text-sm font-black text-slate-800">${userB.length} / ${MAX_DAYS_PER_MONTH}</span></div><div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-indigo-600 h-1.5 rounded-full" style="width: ${(userB.length / MAX_DAYS_PER_MONTH) * 100}%"></div></div></div><div class="p-4 bg-slate-50 rounded-2xl border border-slate-100"><div class="flex justify-between items-end mb-2"><span class="text-xs font-bold text-slate-400">Venerdì</span><span class="text-sm font-black text-slate-800">${userB.filter(b=>{ const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0); return d.getDay()===5; }).length} / ${MAX_FRIDAYS_PER_MONTH}</span></div><div class="w-full bg-slate-200 rounded-full h-1.5"><div class="bg-indigo-400 h-1.5 rounded-full" style="width: ${(userB.filter(b=>{ const d = new Date(b.date.split('-')[0], b.date.split('-')[1]-1, b.date.split('-')[2], 12,0,0); return d.getDay()===5; }).length / MAX_FRIDAYS_PER_MONTH) * 100}%"></div></div></div></div></div><div class="lg:col-span-3 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden"><div class="p-8 border-b flex items-center justify-between bg-slate-50"><h2 class="text-2xl font-black uppercase text-slate-800 tracking-tighter">${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}</h2><div class="flex gap-3"><button onclick="changeMonth(-1)" class="p-3 bg-white border border-slate-300 rounded-xl hover:text-indigo-600 transition-all active:scale-90"><i data-lucide="chevron-left" class="w-5 h-5"></i></button><button onclick="changeMonth(1)" class="p-3 bg-white border border-slate-300 rounded-xl hover:text-indigo-600 transition-all active:scale-90"><i data-lucide="chevron-right" class="w-5 h-5"></i></button></div></div><div class="p-8 flex-1"><div class="grid grid-cols-7 gap-4 mb-6 text-center font-black text-slate-300 text-xs uppercase tracking-widest">${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div>${d}</div>`).join('')}</div><div class="grid grid-cols-7 gap-4">${generateCalendarCellsHTML()}</div></div></div></main>`;
    }

    function generateCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        let html = ''; const selStr = getLocalDateString(state.selectedDate);
        
        for (let i = 0; i < firstDay; i++) html += `<div class="aspect-square rounded-2xl bg-slate-50 opacity-40 border border-dashed border-slate-200"></div>`;
        for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day, 12, 0, 0); 
            const dStr = getLocalDateString(dObj);
            const isSel = selStr === dStr;
            const floorB = state.bookings.filter(b => b.date === dStr && b.floor === state.currentUser.floor);
            const mSw = FLOORS[state.currentUser.floor]?.maxSw || 1;
            const myB = state.bookings.find(b => String(b.userId) === String(state.currentUser.id) && b.date === dStr);
            
            const chiusuraMotivo = CLOSED_DAYS[dStr];
            const isC = !!chiusuraMotivo;
            let p = Math.round((floorB.length / mSw) * 100); if (p > 100) p = 100;
            const colors = getCapacityColorLevels(p);
            
            let cCl = `day-cell aspect-square p-3 rounded-2xl border flex flex-col relative transition-all cursor-pointer ${isSel ? 'ring-4 ring-indigo-300 ring-offset-2 border-indigo-500 z-10 scale-[1.02]' : 'hover:border-indigo-300 hover:shadow-lg'}`;
            let bH = "";
            
            if (isC) { 
                cCl += " bg-orange-50 border-orange-200 pointer-events-none opacity-80"; 
                bH = `<div class="text-[9px] font-black bg-orange-200 text-orange-700 rounded-lg py-1.5 px-1 text-center uppercase truncate shadow-sm">${chiusuraMotivo}</div>`; 
            }
            else if (myB) { 
                cCl += " bg-indigo-600 border-indigo-700 shadow-2xl"; 
                bH = `<div class="text-[9px] font-black bg-white/20 text-white rounded-lg py-1.5 px-1 text-center shadow-sm uppercase tracking-tighter backdrop-blur-sm">IL TUO SW</div>`; 
            }
            else if (floorB.length >= mSw) { 
                cCl += " bg-red-50 border-red-200"; 
                bH = `<div class="text-[9px] font-black bg-red-500 text-white rounded-lg py-1.5 px-1 text-center shadow-sm uppercase flex items-center justify-center gap-1"><i data-lucide="lock" class="w-3 h-3 text-white"></i> PIENO</div>`; 
            }
            else { 
                cCl += ` bg-white border-slate-200`; 
                bH = `<div class="text-[9px] font-bold text-center ${colors.badgeText} ${colors.badgeBg} rounded-lg py-1.5 border ${colors.badgeBorder} shadow-sm">SW AL ${p}%</div>`; 
            }
            html += `<div class="${cCl}" onclick="selectDate('${dStr}')"><span class="font-black text-sm ${isC ? 'text-orange-800' : myB ? 'text-white' : 'text-slate-700'}">${day}</span><div class="mt-auto pt-1">${bH}</div></div>`;
        }
        return html;
    }

    function attachDashboardListeners() { }
    function attachBoardListeners() { document.querySelectorAll('.board-day-cell').forEach(c => { c.onclick = () => openDayDetails(c.dataset.date); }); }

    loadDataFromGoogleSheets();

</script>
</body>
</html>
