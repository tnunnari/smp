function generateBoardCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const year = state.currentMonthDate.getFullYear();
        const month = state.currentMonthDate.getMonth();
const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        
        let firstDay = new Date(year, month, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1; 
        
let html = '';
        let totalCap = 0; Object.keys(FLOORS).forEach(f => totalCap += FLOORS[f].maxSw);
        for (let i = 0; i < firstDay; i++) html += `<div class="h-32 rounded-xl bg-slate-50 opacity-50 border border-transparent"></div>`;

        let totalStudioCapacity = 0;
        Object.keys(FLOORS).forEach(f => totalStudioCapacity += FLOORS[f].maxSw);

        for (let i = 0; i < firstDay; i++) {
            html += `<div class="h-32 rounded-xl bg-slate-50/50 border border-slate-100 opacity-50"></div>`;
        }

for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = getLocalDateString(new Date(year, month, day)), dayB = state.bookings.filter(b => b.date === dateStr);
            const perc = totalCap > 0 ? Math.round((dayB.length / totalCap) * 100) : 0, colors = getCapacityColorLevels(perc);
            const isC = CLOSED_DAYS.includes(dateStr);
            let cellCl = `board-day-cell h-32 p-2 rounded-xl border flex flex-col relative transition-all shadow-sm cursor-pointer `;
            const dateObj = new Date(year, month, day);
            const dateStr = getLocalDateString(dateObj);
            const dayOfWeek = dateObj.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const isClosed = CLOSED_DAYS.includes(dateStr);
            
            const dayBookings = state.bookings.filter(b => b.date === dateStr);
            const globalPercentage = totalStudioCapacity > 0 ? Math.round((dayBookings.length / totalStudioCapacity) * 100) : 0;
            const colors = getCapacityColorLevels(globalPercentage);

            let cellClass = `board-day-cell h-32 p-2 rounded-xl border flex flex-col relative transition-all shadow-sm cursor-pointer `;
            let contentClass = "";
let innerHtml = "";
            if (isC) { cellCl += " bg-orange-50 border-orange-200"; innerHtml = `<div class="mt-auto text-[10px] font-bold bg-orange-100 text-orange-600 rounded py-1 text-center uppercase">Chiuso</div>`; }
            else {
                // CORREZIONE: I colori ora seguono la saturazione reale e non vengono sovrascritti dal grigio dei weekend
                cellCl += ` ${colors.badgeBg} ${colors.badgeBorder} hover:shadow-md hover:-translate-y-1`;
                innerHtml = `<div class="mt-1 space-y-0.5 overflow-hidden flex-1">${dayB.map(b => `<div class="text-[9px] font-medium bg-white/80 text-slate-700 px-1 rounded truncate shadow-sm mb-0.5">${USERS.find(u=>u.id==b.userId)?.name || "..." }</div>`).join('')}</div><div class="text-[9px] ${colors.badgeText} text-right mt-1 font-extrabold uppercase">${perc}% SAT</div>`;

            if (isClosed) {
                cellClass += " bg-orange-50 border-orange-200";
                contentClass = "text-orange-800 font-bold";
                innerHtml = `<div class="mt-auto text-[10px] font-bold bg-orange-100 text-orange-600 rounded-md px-1 py-1 text-center uppercase shadow-sm">Studio Chiuso</div>`;
            } else if (isWeekend) {
                cellClass += " bg-slate-50 border-slate-200 opacity-60 pointer-events-none";
                contentClass = "text-slate-400";
            } else {
                cellClass += ` ${colors.badgeBg} ${colors.badgeBorder} hover:shadow-md hover:-translate-y-1`;
                contentClass = `${colors.badgeText} font-bold`;
                
                if (dayBookings.length > 0) {
                    let namesHtml = dayBookings.map(b => {
                        const user = USERS.find(u => u.id === b.userId);
                        const name = user ? user.name : "Sconosciuto";
                        return `<div class="text-[9px] font-medium bg-white/80 text-slate-700 px-1 py-0.5 rounded border border-slate-200 truncate shadow-sm mb-0.5">${name}</div>`;
                    }).join('');
                    
                    innerHtml = `
                    <div class="mt-1 space-y-0.5 overflow-hidden flex-1 pointer-events-none">
                        ${namesHtml}
                    </div>
                    <div class="text-[9px] ${colors.badgeText} text-right mt-1 font-extrabold uppercase tracking-tight pointer-events-none">${globalPercentage}% Saturazione</div>`;
                } else {
                    innerHtml = `<div class="mt-auto text-[9px] font-medium text-slate-400 text-center italic pointer-events-none">Nessun dipendente</div>`;
                }
}
            html += `<div class="${cellCl}" data-date="${dateStr}"><span class="font-bold text-xs ${isC ? 'text-orange-800' : colors.badgeText}">${day}</span>${innerHtml}</div>`;

            html += `
                <div class="${cellClass}" data-date="${dateStr}">
                    <div class="flex justify-between items-start pointer-events-none">
                        <span class="${contentClass}">${day}</span>
                    </div>
                    ${innerHtml}
                </div>`;
}
return html;
}

        const year = state.currentMonthDate.getFullYear(), month = state.currentMonthDate.getMonth();
        const year = state.currentMonthDate.getFullYear();
        const month = state.currentMonthDate.getMonth();
const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1;
        let html = ''; const selStr = getLocalDateString(state.selectedDate);
        for (let i = 0; i < firstDay; i++) html += `<div class="aspect-square rounded-xl bg-slate-50 opacity-50 border border-transparent"></div>`;
        let firstDay = new Date(year, month, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1; 
        let html = '';
        const selectedDateStr = getLocalDateString(state.selectedDate);
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="aspect-square rounded-xl bg-slate-50/50 border border-slate-100 opacity-50"></div>`;
        }
for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day), dStr = getLocalDateString(dObj), isSel = selStr === dStr;
            const floorB = state.bookings.filter(b => b.date === dStr && b.floor === state.currentUser.floor);
            const mSw = FLOORS[state.currentUser.floor].maxSw, myB = state.bookings.find(b => b.date === dStr && b.userId == state.currentUser.id);
            const isC = CLOSED_DAYS.includes(dStr);
            let p = Math.round((floorB.length / mSw) * 100); if (p > 100) p = 100;
            const colors = getCapacityColorLevels(p);
            let cCl = `day-cell aspect-square p-2 rounded-xl border flex flex-col relative transition-all cursor-pointer ${isSel ? 'ring-4 ring-indigo-300 ring-offset-1 border-indigo-500 z-10' : ''}`, contCl = "text-slate-700", bH = "";
            
            if (isC) { 
                cCl += " bg-orange-50 border-orange-200"; contCl = "text-orange-800 font-bold"; bH = `<div class="text-[9px] font-bold bg-orange-100 text-orange-600 rounded px-1 text-center uppercase shadow-sm">Chiuso</div>`; 
            const dateObj = new Date(year, month, day);
            const dateStr = getLocalDateString(dateObj);
            const dayOfWeek = dateObj.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const isClosed = CLOSED_DAYS.includes(dateStr);
            const isSelected = selectedDateStr === dateStr;
            const floorBookingsToday = state.bookings.filter(b => b.date === dateStr && b.floor === state.currentUser.floor);
            const maxSw = FLOORS[state.currentUser.floor].maxSw;
            const isFloorFull = floorBookingsToday.length >= maxSw;
            const myBooking = state.bookings.find(b => b.date === dateStr && b.userId === state.currentUser.id);
            let percentage = Math.round((floorBookingsToday.length / maxSw) * 100);
            if (percentage > 100) percentage = 100;
            const colors = getCapacityColorLevels(percentage);
            let cellClass = `day-cell aspect-square p-2 rounded-xl border flex flex-col relative transition-all cursor-pointer ${isSelected ? 'ring-4 ring-indigo-300 ring-offset-1 border-indigo-500 z-10' : ''}`;
            let contentClass = "";
            let badgeHtml = "";
            if (isClosed) {
                cellClass += " bg-orange-50 border-orange-200";
                contentClass = "text-orange-800";
                badgeHtml = `<div class="text-[10px] font-bold bg-orange-100 text-orange-600 rounded-md px-1 py-1 text-center uppercase shadow-sm">Chiuso</div>`;
            } else if (isWeekend) {
                cellClass += " bg-slate-50 border-slate-200 opacity-60";
                contentClass = "text-slate-400";
            } else if (myBooking) {
                cellClass += " bg-indigo-600 border-indigo-700 shadow-md shadow-indigo-200";
                contentClass = "text-white";
                badgeHtml = `<div class="text-[10px] font-bold bg-white text-indigo-700 rounded-md px-1 py-1 text-center shadow-sm flex items-center justify-center gap-1"><i data-lucide="check-circle-2" class="w-3 h-3 text-green-500"></i> Il tuo SW</div>`;
            } else if (isFloorFull) {
                cellClass += " bg-red-50 border-red-200 hover:bg-red-100";
                contentClass = "text-red-900";
                badgeHtml = `<div class="text-[10px] font-bold bg-red-500 text-white rounded-md px-1 py-1 text-center flex items-center justify-center gap-1 shadow-sm"><i data-lucide="lock" class="w-3 h-3"></i> Pieno</div>`;
            } else {
                cellClass += " bg-white border-slate-200 hover:border-indigo-400 hover:bg-indigo-50";
                contentClass = "text-slate-700";
                badgeHtml = `<div class="text-[10px] font-semibold text-center ${colors.badgeText} ${colors.badgeBg} ${colors.badgeBorder} rounded-md py-1 border shadow-sm transition-colors">SW al ${percentage}%</div>`;
}
            else if (myB) { 
                cCl += " bg-indigo-600 border-indigo-700 shadow-md"; contCl = "text-white font-bold"; bH = `<div class="text-[9px] font-bold bg-white text-indigo-700 rounded px-1 text-center shadow-sm">IL TUO SW</div>`; 
            }
            else if (floorB.length >= mSw) { 
                cCl += " bg-red-50 border-red-200"; contCl = "text-red-900 font-bold"; bH = `<div class="text-[9px] font-bold bg-red-500 text-white rounded px-1 text-center shadow-sm uppercase flex items-center justify-center gap-1"><i data-lucide="lock" class="w-3 h-3"></i> Pieno</div>`; 
            }
            else { 
                cCl += " bg-white border-slate-200 hover:border-indigo-400"; bH = `<div class="text-[9px] font-semibold text-center ${colors.badgeText} ${colors.badgeBg} rounded py-1 border ${colors.badgeBorder} shadow-sm">SW al ${p}%</div>`; 
            }
            html += `<div class="${cCl}" onclick="selectDate('${dStr}')"><span class="font-bold text-xs ${contCl}">${day}</span><div class="mt-auto pt-1">${bH}</div></div>`;
            const pointerIcon = (isSelected && !isWeekend && !isClosed) ? `<i data-lucide="mouse-pointer-click" class="w-4 h-4 ${myBooking ? 'text-white' : 'text-indigo-400'} animate-bounce"></i>` : '';
            html += `<div class="${cellClass}" data-date="${dateStr}">
                    <div class="flex justify-between items-start">
                        <span class="font-bold ${contentClass}">${day}</span>
                        ${pointerIcon}
                    </div>
                    ${(!isWeekend || isClosed) ? `<div class="mt-auto pt-2 space-y-1">${badgeHtml}</div>` : ''}
                </div>`;
}
return html;
}
